name: Update followers.json (no Meta API)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch followers and write JSON
        run: |
          set -e

          USER=upupandawayoffical
          UPDATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          COUNT=$(curl -fsSL -A "Mozilla/5.0" "https://instastatistics.com/${USER}" \
            | python3 -c 'import re,sys; h=sys.stdin.read(); m=re.search(r"([0-9][0-9,]*)\s*Followers", h, re.I); print(m.group(1).replace(",","")) if m else sys.exit(1)')

          echo "Followers: $COUNT"

          printf '{\n  "handle": "%s",\n  "followers": %s,\n  "updated": "%s"\n}\n' \
            "$USER" "$COUNT" "$UPDATED" > followers.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add followers.json
          git commit -m "Auto-update followers.json" || exit 0
          git push
