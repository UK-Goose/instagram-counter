name: Update followers.json (no Meta API)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch follower count from Mixerno
        run: |
          set -e

          USER="upupandawayoffical"
          URL="https://mixerno.space/embed-count/instagram-user-counter/${USER}"

          COUNT=$(curl -fsS "$URL" | tr -d '\n\r ')

          if ! echo "$COUNT" | grep -Eq '^[0-9]+$'; then
            echo "Unexpected response:"
            echo "$COUNT"
            exit 1
          fi

          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > followers.json << EOF
          {
            "handle": "${USER}",
            "followers": ${COUNT},
            "updated": "${UPDATED}"
          }
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add followers.json
          git commit -m "Auto-update followers.json" || exit 0
          git push
