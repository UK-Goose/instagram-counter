name: Update followers.json (no Meta API)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch follower count from Instastatistics
        shell: bash
        run: |
          set -e

          USER="upupandawayoffical"
          URL="https://instastatistics.com/${USER}"
          UPDATED="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          HTML="$(curl -fsSL -A "Mozilla/5.0 (compatible; GitHubActionsBot/1.0)" "${URL}")"

          COUNT="$(python3 - <<'PY'
import re, sys
html = sys.stdin.read()

# Find a number followed by the word "Followers" (very common layout on Instastatistics pages)
m = re.search(r'\\b([0-9][0-9,]*)\\b\\s*\\n\\s*Followers\\b', html, flags=re.IGNORECASE)
if not m:
    # fallback: number + whitespace + Followers
    m = re.search(r'\\b([0-9][0-9,]*)\\b\\s*Followers\\b', html, flags=re.IGNORECASE)

if not m:
    raise SystemExit(1)

count = m.group(1).replace(',', '')
if not count.isdigit():
    raise SystemExit(1)

print(count)
PY
          <<< "$HTML")"

          echo "Followers: $COUNT"

          printf '{\n  "handle": "%s",\n  "followers": %s,\n  "updated": "%s"\n}\n' \
            "${USER}" "${COUNT}" "${UPDATED}" > followers.json

      - name: Commit and push if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add followers.json
          git commit -m "Auto-update followers.json" || exit 0
          git push
