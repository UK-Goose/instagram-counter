name: Update followers.json (no Meta API)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch follower count from Mixerno (robust)
        shell: bash
        run: |
          set -e

          USER="upupandawayoffical"
          URL="https://mixerno.space/embed-count/instagram-user-counter/${USER}"
          UPDATED="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          COUNT=""

          # Try up to 3 times
          for i in 1 2 3; do
            RESP="$(curl -fsSL \
              -A "Mozilla/5.0 (compatible; GitHubActionsBot/1.0)" \
              -H "Accept: text/plain,*/*" \
              "${URL}" || true)"

            CANDIDATE="$(echo "${RESP}" | tr -d '\n\r ' )"

            if echo "${CANDIDATE}" | grep -Eq '^[0-9]+$'; then
              COUNT="${CANDIDATE}"
              echo "Got follower count: ${COUNT}"
              break
            fi

            echo "Attempt ${i} failed. Response head:"
            echo "${RESP}" | head -c 200 || true
            echo ""
            sleep 2
          done

          # If it fails, do NOT error — keep existing followers.json
          if ! echo "${COUNT}" | grep -Eq '^[0-9]+$'; then
            echo "Could not fetch a numeric count. Keeping existing followers.json."
            exit 0
          fi

          # Write JSON safely (no heredocs)
          printf '{\n  "handle": "%s",\n  "followers": %s,\n  "updated": "%s"\n}\n' \
            "${USER}" "${COUNT}" "${UPDATED}" > followers.json

      - name: Commit and push if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add followers.json
          git commit -m "Auto-update followers.json" || exit 0
          git push
